services:
  - type: web
    name: afriserve-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: database
          name: afriserve-db
          property: connectionString

databases:
  - name: afriserve-db
    plan: free
