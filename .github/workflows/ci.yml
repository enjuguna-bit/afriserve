name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: afriserve_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d afriserve_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build server
        run: npm run build:server

      - name: Verify runtime migrations (SQLite)
        env:
          DB_CLIENT: sqlite
          DB_PATH: ./data/ci-migrations.db
          DATABASE_URL: file:./data/ci-migrations.db
        run: node dist/scripts/verify_runtime_migrations.js

      - name: Check SQLite schema drift
        env:
          DB_CLIENT: sqlite
          DATABASE_URL: file:./data/ci-migrations.db
        run: npm run ci:prisma-check:sqlite

      - name: Check Postgres schema drift
        env:
          DB_CLIENT: postgres
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriserve_ci?schema=public
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriserve_ci?schema=shadow
        run: npm run ci:prisma-check:postgres

      - name: Run tests with coverage on Postgres
        env:
          DB_CLIENT: postgres
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/afriserve_ci?schema=public
        run: npm run test:coverage:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build production image
        run: docker build --target production .

