name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Static analysis ───────────────────────────────────────────────────

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      # ── Build ─────────────────────────────────────────────────────────────

      - name: Build server
        run: npm run build:server

      # ── Schema integrity ──────────────────────────────────────────────────

      - name: Verify runtime migrations (SQLite)
        env:
          DB_CLIENT: sqlite
          DB_PATH: ./data/ci-migrations.db
          DATABASE_URL: file:./data/ci-migrations.db
        run: node dist/scripts/verify_runtime_migrations.js

      - name: Check Postgres schema drift
        # Fails the build if prisma/postgres/schema.prisma is out of sync with
        # the migration history — catches forgotten migration files.
        run: npm run ci:prisma-check
        continue-on-error: false

      # ── Tests with coverage ───────────────────────────────────────────────

      - name: Run tests with coverage
        env:
          DB_CLIENT: sqlite
        # c8 wraps node --test and instruments the compiled JS under dist/.
        # Reports: text summary to stdout, lcov for upload, html for the artifact.
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      # ── Docker build check ────────────────────────────────────────────────

      - name: Build production image
        run: docker build --target production .
